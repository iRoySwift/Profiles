# YouTube Block AD
# Author: Roy
# Updated: 2024-05-12
# Notes:
# 1. Covers video ads, feed ads, search ads, player ads, shorts, auto PiP, background play, and auto translation.
# 2. Not suitable for nodes that allow UDP forwarding or for Premium accounts.
# 3. If video ads still appear, add `udp_drop_list=443` under `[general]` in Quantumult X.
# 4. Tip: exit the app right after opening a video to keep audio playing without PiP.
# Channel: https://t.me/ddgksf2021
# Repo: https://github.com/iRoySwift

hostname = -redirector*.googlevideo.com,*.googlevideo.com,www.youtube.com,s.youtube.com,youtubei.googleapis.com

# Video ad requests
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200

# App behavior patches: PiP, background play, feed, search, player, shorts, pre-roll
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch) url script-request-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/dist/youtube.request.preview.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/dist/youtube.response.preview.js

# Generic ad requests
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200
